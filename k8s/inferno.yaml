apiVersion: v1
kind: Namespace
metadata:
  name: inferno
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inferno
  namespace: inferno
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inferno
  template:
    metadata:
      labels:
        app: inferno
    spec:
      containers:
        - name: inferno
          image: infernocommunity/client-fhir-testing:latest
          ports:
            - containerPort: 4567
          readinessProbe:
            httpGet:
              path: /
              port: 4567
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 4567
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: inferno
  namespace: inferno
spec:
  type: NodePort
  selector:
    app: inferno
  ports:
    - name: http
      port: 4567
      targetPort: 4567
      nodePort: 30067
